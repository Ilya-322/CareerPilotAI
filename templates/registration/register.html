<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — CareerPilot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center px-4 py-8">

    <div class="max-w-md w-full">
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3">
                <span class="text-4xl font-bold text-emerald-400">CP</span>
                <span class="font-semibold text-3xl">CareerPilot AI</span>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 md:p-10">
            <h2 class="text-3xl font-bold text-center mb-8">Создать аккаунт</h2>

            {% if form.errors %}
            <div class="bg-red-900 border border-red-700 text-red-300 px-5 py-4 rounded-2xl mb-6 text-sm">
                {% for field in form %}
                    {% for error in field.errors %}
                        {{ error }}<br>
                    {% endfor %}
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="space-y-6">
                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Email</label>
                        <input type="email" name="email" value="{{ form.email.value|default:'' }}"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>

                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">ФИО</label>
                        <input type="text" name="full_name" value="{{ form.full_name.value|default:'' }}"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>

                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Имя пользователя</label>
                        <input type="text" name="username" value="{{ form.username.value|default:'' }}"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>

                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Пароль</label>
                        <input type="password" name="password1"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>

                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Повторите пароль</label>
                        <input type="password" name="password2"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>
                </div>

                <button type="submit"
                        class="w-full mt-10 bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg transition-all">
                    Зарегистрироваться
                </button>
            </form>

            <div class="text-center mt-8 text-zinc-400 text-sm">
                Уже есть аккаунт?
                <a href="/login/" class="text-emerald-400 hover:text-emerald-500">Войти</a>
            </div>
        </div>
    </div>

</body>
</html>
