<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CareerPilot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center px-4">

    <div class="max-w-md w-full">
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3">
                <span class="text-4xl font-bold text-emerald-400">CP</span>
                <span class="font-semibold text-3xl">CareerPilot AI</span>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 md:p-10">
            <h2 class="text-3xl font-bold text-center mb-8">Добро пожаловать</h2>

            {% if form.errors %}
            <div class="bg-red-900 border border-red-700 text-red-300 px-4 py-3 rounded-2xl mb-6 text-sm">
                Неверное имя пользователя или пароль. Попробуйте ещё раз.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="space-y-6">
                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Имя пользователя или Email</label>
                        <input type="text" name="username"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500" required>
                    </div>
                    <div>
                        <label class="block text-zinc-400 text-sm mb-2">Пароль</label>
                        <input type="password" name="password"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500" required>
                    </div>
                </div>

                <button type="submit"
                        class="w-full mt-10 bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg transition-all">
                    Войти
                </button>
            </form>

            <div class="text-center mt-8 text-zinc-400 text-sm">
                Ещё нет аккаунта?
                <a href="/register/" class="text-emerald-400 hover:text-emerald-500">Зарегистрироваться</a>
            </div>
        </div>
    </div>

</body>
</html>
